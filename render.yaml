# render.yaml — Render Infrastructure as Code
# NOTE: Render Free plan doesn't include MySQL natively.
# Use an external MySQL provider (see DEPLOY.md) and set DATABASE_URL manually.

services:
  - type: web
    name: skillmart-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard

  - type: web
    name: skillmart-frontend
    runtime: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
