<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Личный кабинет — Skillmart</title>
  <link rel="stylesheet" href="/css/app.css"/>
  <style>
    /* ── NOTIF BELL ──────────────────────────────── */
    .notif-bell {
      position:fixed; top:.9rem; right:1.2rem; z-index:300;
      display:flex; align-items:center; gap:.5rem;
    }
    .bell-btn {
      width:38px; height:38px; border-radius:10px;
      background:var(--surface); border:1.5px solid rgba(0,0,0,.1);
      box-shadow:0 2px 8px rgba(0,0,0,.07);
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; cursor:pointer; transition:all .18s; position:relative;
    }
    .bell-btn:hover { border-color:var(--indigo); }
    .bell-count {
      position:absolute; top:-5px; right:-5px;
      min-width:16px; height:16px; border-radius:100px;
      background:var(--red); color:#fff;
      font:700 .62rem 'Inter',sans-serif;
      display:flex; align-items:center; justify-content:center;
      padding:0 3px; border:2px solid var(--bg);
      opacity:0; transform:scale(.6); transition:all .2s;
    }
    .bell-count.show { opacity:1; transform:none; }
    .bell-dropdown {
      position:absolute; top:calc(100% + .55rem); right:0;
      width:310px; max-height:380px; overflow-y:auto;
      background:var(--surface); border-radius:var(--r-lg);
      border:1.5px solid rgba(0,0,0,.1);
      box-shadow:0 12px 48px rgba(0,0,0,.14);
      opacity:0; pointer-events:none;
      transform:translateY(-6px) scale(.97);
      transition:all .22s cubic-bezier(.34,1.56,.64,1);
    }
    .bell-dropdown.open { opacity:1; pointer-events:all; transform:none; }
    .bell-header { padding:.7rem 1rem .5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .bell-header span { font:600 .82rem 'Inter',sans-serif; }
    .bell-mark { font-size:.72rem; color:var(--indigo); cursor:pointer; font-weight:600; }
    .bell-mark:hover { text-decoration:underline; }
    .bell-item {
      display:flex; align-items:flex-start; gap:.65rem;
      padding:.7rem 1rem; transition:background .15s; cursor:pointer;
      border-bottom:1px solid var(--border);
    }
    .bell-item:last-child { border-bottom:none; }
    .bell-item:hover { background:rgba(99,102,241,.04); }
    .bell-item.unread { background:rgba(99,102,241,.04); }
    .bell-ico  { font-size:1rem; flex-shrink:0; margin-top:.08rem; }
    .bell-title { font:600 .79rem 'Inter',sans-serif; margin-bottom:.12rem; }
    .bell-body  { font-size:.72rem; color:var(--muted); line-height:1.45; }
    .bell-time  { font-size:.65rem; color:var(--subtle); margin-top:.15rem; }
    .bell-empty { padding:1.75rem; text-align:center; color:var(--muted); font-size:.82rem; }
    .bell-footer { padding:.55rem 1rem; border-top:1px solid var(--border); }

    /* ── PRICE CHANGE ─────────────────────────────── */
    .price-change-bar {
      background:rgba(245,158,11,.06); border:1.5px solid rgba(245,158,11,.2);
      border-radius:var(--r); padding:.7rem 1rem; margin-top:.75rem;
      display:flex; align-items:center; gap:.65rem; flex-wrap:wrap;
    }
    .price-change-bar label { font-size:.78rem; font-weight:600; color:var(--amber); flex-shrink:0; }
    .price-change-bar input { flex:1; min-width:100px; padding:.4rem .7rem; font-size:.84rem; border-radius:8px; height:34px; }
    .price-change-bar textarea { flex:2; min-width:140px; padding:.4rem .7rem; font-size:.8rem; border-radius:8px; min-height:34px; max-height:60px; resize:none; }

    /* ── SIDEBAR BRAND ────────────────────────────── */
    .sb-brand {
      font-family:'Bricolage Grotesque',sans-serif; font-size:1.1rem; font-weight:800;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; text-decoration:none; display:block;
    }
    .mob-btn {
      display:none; position:fixed; top:.85rem; left:.85rem; z-index:301;
      width:38px; height:38px; border-radius:10px; background:var(--surface);
      border:1.5px solid var(--border); box-shadow:var(--shadow);
      align-items:center; justify-content:center; font-size:1.1rem; cursor:pointer;
    }
    @media(max-width:960px){ .mob-btn{display:flex} }
    .sb-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:99; }
    .sb-overlay.show { display:block; }

    /* ── AVATAR ───────────────────────────────────── */
    .av-ring {
      width:72px; height:72px; border-radius:18px;
      background:var(--grad); display:flex; align-items:center;
      justify-content:center; font-size:1.8rem; font-weight:700;
      color:#fff; overflow:hidden; box-shadow:0 4px 16px rgba(99,102,241,.3);
      flex-shrink:0; position:relative;
    }
    .av-ring img { width:100%; height:100%; object-fit:cover; }
    .av-overlay {
      position:absolute; inset:0; background:rgba(0,0,0,.5);
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:.62rem; font-weight:700; opacity:0;
      transition:opacity .18s; cursor:pointer; border-radius:18px;
    }
    .av-ring:hover .av-overlay { opacity:1; }
  </style>
</head>
<body>
<button class="mob-btn" onclick="toggleSB()">☰</button>
<div class="sb-overlay" id="sb-ov" onclick="closeSB()"></div>

<!-- NOTIFICATION BELL (top right) -->
<div class="notif-bell" id="bell-wrap">
  <div class="bell-btn" id="bell-btn" onclick="toggleBell()">
    🔔
    <div class="bell-count" id="bell-cnt"></div>
  </div>
  <div class="bell-dropdown" id="bell-dd">
    <div class="bell-header">
      <span>Уведомления</span>
      <span class="bell-mark" onclick="markAllRead()">Прочитать все</span>
    </div>
    <div id="bell-list"><div class="bell-empty">Загрузка...</div></div>
    <div class="bell-footer">
      <button class="btn btn-ghost btn-sm btn-block" onclick="go('notifs');closeBell()">Все уведомления →</button>
    </div>
  </div>
</div>

<div class="dash-wrap">
  <aside class="dash-sb" id="sb">
    <div style="padding:1.1rem 1rem .1rem">
      <a href="/" class="sb-brand">Skillmart</a>
    </div>
    <div class="dash-sb-user">
      <div class="dash-sb-av" id="sb-av"></div>
      <div><div class="dash-sb-name" id="sb-name"></div><div class="dash-sb-role" id="sb-role"></div></div>
    </div>
    <nav class="dash-sb-nav" id="sb-nav"></nav>
  </aside>

  <div class="dash-main">
    <div class="dash-content" id="dc">
      <div class="loader-wrap" style="padding:4rem 2rem"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Service modal -->
<div class="modal-overlay" id="svc-modal">
  <div class="modal" style="max-width:540px">
    <div class="modal-header"><h3 id="sm-title">Создать услугу</h3><button class="modal-close" onclick="closeSvcModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Название</label><input type="text" id="sf-title" placeholder="Краткое описание (мин. 10 символов)"/></div>
      <div class="form-group"><label>Категория</label><select id="sf-cat"></select></div>
      <div class="grid-2">
        <div class="form-group"><label>Цена (₽)</label><input type="number" id="sf-price" placeholder="1000" min="1"/></div>
        <div class="form-group"><label>Срок (дней)</label><input type="number" id="sf-days" placeholder="3" min="1"/></div>
      </div>
      <div class="form-group"><label>Описание</label><textarea id="sf-desc" rows="5" placeholder="Подробно опишите услугу..."></textarea></div>
      <div class="form-group"><label>Теги <span class="form-hint">через запятую</span></label><input type="text" id="sf-tags" placeholder="логотип, дизайн"/></div>
      <div id="sf-err" class="error-msg"></div>
      <button class="btn btn-primary btn-block btn-lg mt-2" id="sf-submit" onclick="submitSvc()">Сохранить</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
if (!requireAuth()) {}
const user = Storage.getUser();
let editSvcId=null, cats=[], pollT=null, bellPoll=null, stars=0;

/* ── SIDEBAR ─────────────────────────────────────────────── */
function buildSB() {
  const av = document.getElementById('sb-av');
  if (user.avatar) { av.innerHTML=`<img src="${esc(user.avatar)}" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`; }
  else             { av.textContent = user.name.charAt(0).toUpperCase(); }
  document.getElementById('sb-name').textContent = user.name;
  document.getElementById('sb-role').textContent = user.role==='customer' ? '🛍️ Заказчик' : '🧑‍💻 Исполнитель';
  const links = user.role==='customer'
    ? [['orders','📦','Мои заказы'],['balance','💰','Баланс'],['notifs','🔔','Уведомления'],['profile','⚙️','Профиль']]
    : [['services','🎯','Мои услуги'],['orders','📦','Входящие заказы'],['balance','💰','Баланс'],['notifs','🔔','Уведомления'],['profile','⚙️','Профиль']];
  document.getElementById('sb-nav').innerHTML =
    links.map(([id,ic,lb]) => `<button class="sb-item" id="si-${id}" onclick="go('${id}')">`+`<span class="ico">${ic}</span>${lb}</button>`).join('')
    +`<div class="sb-sep"></div>`
    +`<a href="/services.html" class="sb-item"><span class="ico">🔍</span>Каталог</a>`
    +`<a href="/" class="sb-item"><span class="ico">🏠</span>Главная</a>`
    +`<div class="sb-sep"></div>`
    +`<button onclick="logout()" class="sb-item danger"><span class="ico">🚪</span>Выйти</button>`;
}
function setActive(id) { document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active')); const el=document.getElementById('si-'+id); if(el) el.classList.add('active'); }
function toggleSB() { document.getElementById('sb').classList.toggle('open'); document.getElementById('sb-ov').classList.toggle('show'); }
function closeSB()  { document.getElementById('sb').classList.remove('open'); document.getElementById('sb-ov').classList.remove('show'); }

/* ── CONTENT PANE ────────────────────────────────────────── */
function setContent(hdr, body) {
  document.getElementById('dc').innerHTML =
    `<div class="dash-content-header">${hdr}</div><div class="dash-inner">${body}</div>`;
}

function go(sec, extra={}) {
  stopPoll();
  setActive(sec);
  closeSB();
  document.getElementById('dc').innerHTML = '<div class="loader-wrap" style="padding:4rem 2rem"><div class="spinner"></div></div>';
  const map = { orders:loadOrders, services:loadServices, balance:loadBalance, notifs:loadNotifs, profile:loadProfile, chat:()=>loadChat(extra.oid) };
  (map[sec]||loadOrders)();
}

/* ── NOTIFICATION BELL ───────────────────────────────────── */
let bellOpen = false;
async function refreshBell() {
  try {
    const res = await api('/notifications?limit=8');
    if (!res) return;
    const list = res.notifications||[];
    const unread = res.unread_count||0;
    const cnt = document.getElementById('bell-cnt');
    if (unread > 0) { cnt.textContent=unread>9?'9+':unread; cnt.classList.add('show'); }
    else            { cnt.classList.remove('show'); }

    const bellList = document.getElementById('bell-list');
    if (!list.length) { bellList.innerHTML='<div class="bell-empty">🔔 Нет уведомлений</div>'; return; }
    const nIcons = { order_created:'📦', order_accepted:'🔄', order_completed:'✅', order_cancelled:'❌', new_message:'💬', new_review:'⭐', payment_received:'💰', price_changed:'💸' };
    bellList.innerHTML = list.map(n => `
      <div class="bell-item ${n.is_read?'':'unread'}" onclick="bellClick('${n.data?.order_id||''}')">
        <span class="bell-ico">${nIcons[n.type]||'🔔'}</span>
        <div>
          <div class="bell-title">${esc(n.title)}</div>
          ${n.body?`<div class="bell-body">${esc(n.body)}</div>`:''}
          <div class="bell-time">${relTime(n.created_at)}</div>
        </div>
      </div>`).join('');
  } catch {}
}
function bellClick(orderId) { closeBell(); if(orderId) go('chat',{oid:orderId}); else go('notifs'); }
function toggleBell() { bellOpen=!bellOpen; document.getElementById('bell-dd').classList.toggle('open',bellOpen); if(bellOpen) refreshBell(); }
function closeBell()  { bellOpen=false; document.getElementById('bell-dd').classList.remove('open'); }
async function markAllRead() { try { await api('/notifications/read-all','PATCH'); refreshBell(); } catch {} }
function relTime(s) {
  const d=new Date(s), now=new Date(), diff=Math.floor((now-d)/1000);
  if(diff<60) return 'только что';
  if(diff<3600) return Math.floor(diff/60)+' мин назад';
  if(diff<86400) return Math.floor(diff/3600)+' ч назад';
  return fmtDate(s);
}
document.addEventListener('click', e => { if(bellOpen && !document.getElementById('bell-wrap').contains(e.target)) closeBell(); });

/* ── ORDERS ──────────────────────────────────────────────── */
async function loadOrders() {
  try {
    const res = await api('/orders?limit=50'); if(!res) return;
    const data = res.data||[];
    window._od = data;
    const isC = user.role==='customer';
    const stats = { total:data.length, active:data.filter(o=>['created','in_progress','review'].includes(o.status)).length, done:data.filter(o=>o.status==='completed').length };
    setContent(
      `<h2><span>${isC?'📦':'📋'}</span>${isC?'Мои заказы':'Входящие заказы'}</h2>`,
      `<div class="stat-cards">
        <div class="stat-card"><div class="stat-card-ico">📊</div><div class="stat-card-val">${stats.total}</div><div class="stat-card-lbl">Всего</div></div>
        <div class="stat-card"><div class="stat-card-ico">⚡</div><div class="stat-card-val">${stats.active}</div><div class="stat-card-lbl">Активных</div></div>
        <div class="stat-card"><div class="stat-card-ico">✅</div><div class="stat-card-val">${stats.done}</div><div class="stat-card-lbl">Завершённых</div></div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="fO(this,'all')">Все</button>
        <button class="tab-btn" onclick="fO(this,'created')">Новые</button>
        <button class="tab-btn" onclick="fO(this,'in_progress')">В работе</button>
        <button class="tab-btn" onclick="fO(this,'review')">На проверке</button>
        <button class="tab-btn" onclick="fO(this,'completed')">Завершённые</button>
        <button class="tab-btn" onclick="fO(this,'cancelled')">Отменённые</button>
      </div>
      <div class="items-list" id="olist">${renderOList(data,'all')}</div>`
    );
  } catch(e) { showErr(e.message); }
}
function fO(btn,f) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.getElementById('olist').innerHTML=renderOList(window._od||[],f); }
function renderOList(data,f) {
  const isC=user.role==='customer';
  const list=f==='all'?data:data.filter(o=>o.status===f);
  if(!list.length) return `<div class="empty"><div class="empty-icon">📭</div><h3>${f==='all'?'Нет заказов':'Нет заказов'}</h3>${f==='all'&&isC?'<a href="/services.html" class="btn btn-primary mt-2">Найти услугу</a>':''}</div>`;
  return list.map(o=>`
    <div class="order-card" onclick="go('chat',{oid:'${o.id}'})">
      <div style="flex:1;min-width:0">
        <div class="order-card-title">${esc(o.service_title)}</div>
        <div class="order-card-meta">
          <span>👤 ${esc(isC?o.executor_name:o.customer_name)}</span>
          <span>📅 ${fmtDate(o.created_at)}</span>
        </div>
      </div>
      <div class="order-card-right">
        <div class="order-card-price">${fmtPrice(o.total_price)}</div>
        ${fmtStatus(o.status)}
      </div>
    </div>`).join('');
}

/* ── CHAT ────────────────────────────────────────────────── */
async function loadChat(oid) {
  if (!oid) { loadOrders(); return; }
  try {
    const order = await api('/orders/'+oid); if(!order) return;
    const isC  = user.role==='customer';
    const other = isC?order.executor_name:order.customer_name;
    const acts  = statusActions(order.status, user.role);

    setContent(
      `<div style="display:flex;align-items:center;gap:.85rem">
        <button onclick="go('orders')" class="btn btn-ghost btn-sm">← Назад</button>
        <h2><span>💬</span>Заказ</h2>
      </div>`,
      `<div class="chat-order-hdr">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;margin-bottom:.2rem">${esc(order.service_title)}</div>
          <div style="font-size:.79rem;color:var(--muted)">👤 ${esc(other)} · <span id="cur-price" style="font-weight:700">💰 ${fmtPrice(order.total_price)}</span></div>
          ${order.requirements?`<div style="font-size:.75rem;color:var(--muted);margin-top:.22rem">📋 ${esc(order.requirements)}</div>`:''}
        </div>
        <div class="chat-actions">
          ${fmtStatus(order.status)}
          ${acts.map(a=>`<button class="btn btn-outline btn-sm" onclick="chStatus('${oid}','${a.to}','${esc(order.service_title).replace(/'/g,"\\'")}')">  ${a.label}</button>`).join('')}
        </div>
      </div>

      <!-- Price change panel (only in active orders) -->
      ${!['completed','cancelled'].includes(order.status) ? `
      <div class="price-change-bar">
        <label>💸 Изменить цену:</label>
        <input type="number" id="new-price" placeholder="${parseFloat(order.total_price).toFixed(0)}" min="1" style="max-width:120px"/>
        <textarea id="price-note" placeholder="Комментарий (необязательно)" rows="1"></textarea>
        <button class="btn btn-outline btn-sm" onclick="changePrice('${oid}')">Применить</button>
      </div>` : ''}

      <div class="chat-wrap">
        <div class="chat-messages" id="msgs"><div class="loader-wrap"><div class="spinner"></div></div></div>
        ${['completed','cancelled'].includes(order.status)?'':
        `<div class="chat-input-wrap">
          <textarea id="ci" placeholder="Сообщение..." rows="1" onkeydown="chatKey(event,'${oid}')"></textarea>
          <button class="chat-send" onclick="send('${oid}')">➤</button>
        </div>`}
      </div>
      <div id="rev-area"></div>`
    );
    fetchMsgs(oid);
    pollT = setInterval(()=>fetchMsgs(oid,true), 3000);
    if (isC && order.status==='completed') checkReview(oid, order.service_id);
  } catch(e) { showErr(e.message, true); }
}

function statusActions(st, role) {
  const m = {
    customer:{ in_progress:[{to:'review',label:'✓ Принять работу'}], review:[{to:'completed',label:'✅ Завершить и оплатить'}] },
    executor:{ created:[{to:'in_progress',label:'▶ Взять в работу'},{to:'cancelled',label:'✕ Отклонить'}], in_progress:[{to:'review',label:'📤 На проверку'}] }
  };
  return m[role]?.[st]||[];
}

async function fetchMsgs(oid, quiet=false) {
  try {
    const data=await api('/messages/'+oid); if(!data) return;
    const wrap=document.getElementById('msgs'); if(!wrap) return;
    const atBot=wrap.scrollHeight-wrap.scrollTop-wrap.clientHeight<80;
    wrap.innerHTML = data.length
      ? data.map(m=>{
          const mine=m.sender_id===user.id;
          const t=new Date(m.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
          // Price change messages get special styling
          const isPrice = m.message.startsWith('💰') || m.message.startsWith('💸');
          return `<div class="chat-msg ${mine?'mine':'theirs'}" ${isPrice?'style="align-self:center;max-width:90%"':''}>
            ${!mine&&!isPrice?`<div class="chat-sender">${esc(m.sender_name)}</div>`:''}
            <div class="chat-bubble" ${isPrice?'style="background:rgba(245,158,11,.1);color:var(--text);border-color:rgba(245,158,11,.2);text-align:center"':''}>${esc(m.message)}</div>
            <div class="chat-time">${t}</div>
          </div>`;
        }).join('')
      : `<div style="text-align:center;color:var(--muted);font-size:.82rem;padding:2rem">Начните общение!</div>`;
    if(atBot||!quiet) wrap.scrollTop=wrap.scrollHeight;
  } catch {}
}
function chatKey(e,oid){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(oid);} }
async function send(oid){
  const inp=document.getElementById('ci'); if(!inp) return;
  const msg=inp.value.trim(); if(!msg) return;
  inp.value='';
  try { await api('/messages/'+oid,'POST',{message:msg}); fetchMsgs(oid); }
  catch(e){ toastErr(e.message); inp.value=msg; }
}
async function chStatus(oid,st,title){
  const lbs={in_progress:'взять в работу',review:'отправить на проверку',completed:'завершить и оплатить',cancelled:'отменить'};
  if(!confirm(`${lbs[st]||st} заказ "${title}"?`)) return;
  try { await api('/orders/'+oid+'/status','PATCH',{status:st}); toastOk('Статус обновлён'); loadChat(oid); refreshBell(); }
  catch(e){ toastErr(e.message); }
}

async function changePrice(oid){
  const v=parseFloat(document.getElementById('new-price')?.value);
  const note=document.getElementById('price-note')?.value.trim();
  if(!v||v<1){ toastErr('Укажите корректную цену'); return; }
  try {
    const res = await api('/orders/'+oid+'/price','PATCH',{price:v, note:note||undefined});
    toastOk('Цена изменена!');
    // Update displayed price
    const el=document.getElementById('cur-price');
    if(el) el.textContent='💰 '+fmtPrice(v);
    document.getElementById('new-price').value='';
    document.getElementById('price-note').value='';
    fetchMsgs(oid);
  } catch(e){ toastErr(e.message); }
}

function stopPoll(){ if(pollT){clearInterval(pollT);pollT=null;} }

async function checkReview(oid,svcId){
  try {
    const revs=await api('/reviews?service_id='+svcId);
    const area=document.getElementById('rev-area'); if(!area) return;
    const mine=revs?.find(r=>r.customer_id===user.id);
    if(mine){

}

async function openSvcModal(id=null){
  editSvcId=id; document.getElementById('sm-title').textContent=id?'Редактировать':'Создать услугу';
  document.getElementById('sf-err').classList.remove('show');
  if(!cats.length){ try{ cats=await api('/categories')||[]; }catch{} }
  const csel=document.getElementById('sf-cat');
  csel.innerHTML=cats.map(c=>`<option value="${c.id}">${c.icon} ${esc(c.name)}</option>`).join('');
  if(id){ try{ const s=await api('/services/'+id); document.getElementById('sf-title').value=s.title; document.getElementById('sf-price').value=s.price; document.getElementById('sf-days').value=s.deadline; document.getElementById('sf-desc').value=s.description; document.getElementById('sf-tags').value=(s.tags||[]).join(', '); csel.value=s.category_id; }catch(e){toastErr('Не загрузить');return;} }
  else { ['sf-title','sf-price','sf-days','sf-desc','sf-tags'].forEach(i=>{document.getElementById(i).value='';}); }
  document.getElementById('svc-modal').classList.add('open');
}

document.getElementById('svc-modal').addEventListener('click',e=>{ if(e.target.id==='svc-modal') closeSvcModal(); });
async function submitSvc(){
  const title=document.getElementById('sf-title').value.trim(),desc=document.getElementById('sf-desc').value.trim(),price=parseFloat(document.getElementById('sf-price').value),days=parseInt(document.getElementById('sf-days').value),catId=parseInt(document.getElementById('sf-cat').value),tags=document.getElementById('sf-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const errEl=document.getElementById('sf-err'); errEl.classList.remove('show');
  if(!title||title.length<10){errEl.textContent='Название: мин. 10 символов';errEl.classList.add('show');return;}
  if(!desc||desc.length<30){errEl.textContent='Описание: мин. 30 символов';errEl.classList.add('show');return;}
  if(!price||price<1){errEl.textContent='Укажите цену';errEl.classList.add('show');return;}
  if(!days||days<1){errEl.textContent='Укажите срок';errEl.classList.add('show');return;}
  const btn=document.getElementById('sf-submit'); btn.disabled=true; btn.textContent='Сохраняем...';
  try{ const body={title,description:desc,price,deadline:days,category_id:catId,tags}; editSvcId?await api('/services/'+editSvcId,'PUT',body):await api('/services','POST',body); toastOk(editSvcId?'Обновлено!':'Услуга создана!'); closeSvcModal(); loadServices(); }
  catch(e){ errEl.textContent=e.message||'Ошибка'; errEl.classList.add('show'); }
  finally{ btn.disabled=false; btn.textContent='Сохранить'; }
}

function levelInfo(n){const c=+n||0;if(c>=100)return{ico:'💎',lbl:'Мастер'};if(c>=30)return{ico:'🔥',lbl:'Эксперт'};if(c>=10)return{ico:'⭐',lbl:'Профи'};return{ico:'🌱',lbl:'Новичок'};}

function onAvatar(event){
  const file=event.target.files[0]; if(!file) return;
  if(file.size>3*1024*1024){toastErr('Файл слишком большой (макс. 3 МБ)');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result;
    document.getElementById('av-preview').innerHTML=`<img src="${b64}" style="width:100%;height:100%;object-fit:cover"/>`;
    // update sidebar too
    const sbAv=document.getElementById('sb-av');
    sbAv.innerHTML=`<img src="${b64}" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>`;
    window._av=b64;
  };
  reader.readAsDataURL(file);
}

async function saveProfile(){
  const name=document.getElementById('p-name')?.value.trim();
  const bio=document.getElementById('p-bio')?.value||'';
  if(!name){toastErr('Введите имя');return;}
  try{
    const body={name, bio};
    if(window._av) body.avatar=window._av;
    const u=await api('/users/me','PUT',body);
    if(u){Storage.setUser({...Storage.getUser(),name:u.name,avatar:u.avatar});document.getElementById('sb-name').textContent=u.name;window._av=null;}
    toastOk('Данные сохранены!');
  }catch(e){toastErr(e.message);}
}

async function saveFull(){
  const name=document.getElementById('p-name')?.value.trim();
  const bio=document.getElementById('p-bio')?.value||'';
  const isExec=user.role==='executor';
  const sc={};
  ['telegram','website','linkedin','github','behance','dribbble'].forEach(k=>{const el=document.getElementById('sc-'+k);if(el?.value.trim()) sc[k]=el.value.trim();});
  const body={name:name||undefined, bio, socials:sc};
  if(window._av) body.avatar=window._av;

  if(isExec){
    body.availability=document.getElementById('ep-avail')?.value;
    body.response_time=document.getElementById('ep-resp')?.value;
    body.specialization=document.getElementById('ep-spec')?.value.trim()||null;
    body.hourly_rate=parseFloat(document.getElementById('ep-rate')?.value)||null;
    const langsRaw=document.getElementById('ep-langs')?.value||'';
    body.languages=langsRaw?langsRaw.split(',').map(l=>l.trim()).filter(Boolean):[];
    const skillsRaw=document.getElementById('ep-skills')?.value||'';
    body.skills=skillsRaw?skillsRaw.split('\n').filter(l=>l.trim()).map(l=>{const[nm,lv]=l.split(':');return nm?.trim()?{name:nm.trim(),level:Math.min(5,Math.max(1,+lv||3))}:null}).filter(Boolean):[];
    const portRaw=document.getElementById('ep-port')?.value||'';
    body.portfolio=portRaw?portRaw.split('\n').filter(l=>l.trim()).map(l=>{const p=l.split('|');return p[0]?.trim()&&p[1]?.trim()?{title:p[0].trim(),url:p[1].trim(),description:p[2]?.trim()||''}:null}).filter(Boolean):[];
  }
  try{
    const u=await api('/users/me','PUT',body);
    if(u){Storage.setUser({...Storage.getUser(),name:u.name,avatar:u.avatar});document.getElementById('sb-name').textContent=u.name;window._av=null;}
    toastOk('Профиль обновлён!');
  }catch(e){toastErr(e.message);}
}

async function changePass(){
  const op=document.getElementById('p-old')?.value,np=document.getElementById('p-new')?.value;
  if(!op||!np){toastErr('Заполните оба поля');return;} if(np.length<6){toastErr('Мин. 6 символов');return;}
  try{await api('/auth/change-password','POST',{old_password:op,new_password:np});toastOk('Пароль изменён');document.getElementById('p-old').value='';document.getElementById('p-new').value='';}
  catch(e){toastErr(e.message);}
}
