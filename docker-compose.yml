services:
  db:
    image: postgres:16-alpine
    container_name: skillmart_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: skillmart123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillmart_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: skillmart
      DB_USER: postgres
      DB_PASSWORD: skillmart123
      JWT_SECRET: skillmart_jwt_secret_change_in_prod
      FRONTEND_URL: http://localhost:8080
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillmart_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
